name: 'dbt_tpch'
version: '1.0.0'

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["data"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
    - "target"
    - "dbt_packages"

profile: tpch

require-dbt-version: [">=1.3.0"]

quoting:
    database: false
    identifier: false
    schema: false

vars:
    max_ship_date: "'1998-12-01'"

models:
  dbt_tpch:
      base:
        schema: base
        +tags: ['base']
      ods:
        schema: ods
        +tags: ['ods']
      wh:
        schema: wh
        +tags: ['wh']
